<style>
  .nav-shell {
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.74);
    backdrop-filter: blur(12px);
    box-shadow:
      0 14px 34px rgba(15, 23, 42, 0.07),
      inset 0 1px 0 rgba(255, 255, 255, 0.84);
    overflow: hidden;
  }

  .navbar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 20px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #0f172a;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 800;
    background: linear-gradient(140deg, #0ea5e9, #22c55e);
    box-shadow: 0 10px 18px rgba(14, 165, 233, 0.3);
  }

  .brand small {
    display: block;
    margin-top: 2px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #4b5563;
    font-weight: 600;
  }

  .menu-toggle {
    display: none;
  }

  .menu-btn {
    display: none;
    width: 42px;
    height: 42px;
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.8);
    margin-left: auto;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 5px;
  }

  .menu-btn span {
    width: 18px;
    height: 2px;
    border-radius: 999px;
    background: #0f172a;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .nav-links {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
    padding: 0;
    margin-left: auto;
  }

  .nav-links a {
    display: inline-block;
    text-decoration: none;
    color: #4b5563;
    font-weight: 700;
    padding: 10px 14px;
    border-radius: 10px;
    transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  }

  .nav-links a:hover,
  .nav-links a:focus-visible {
    color: #0f172a;
    background: rgba(255, 255, 255, 0.92);
    transform: translateY(-1px);
    outline: none;
  }

  .cta {
    margin-left: 8px;
    text-decoration: none;
    color: #fff;
    font-size: 0.92rem;
    font-weight: 800;
    padding: 11px 16px;
    border-radius: 14px;
    background: linear-gradient(140deg, #0ea5e9, #22c55e);
    box-shadow: 0 11px 20px rgba(14, 165, 233, 0.28);
    white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .cta:hover,
  .cta:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 16px 24px rgba(14, 165, 233, 0.34);
    outline: none;
  }

  @media (max-width: 820px) {
    .navbar {
      flex-wrap: wrap;
      gap: 12px;
    }

    .menu-btn {
      display: inline-flex;
    }

    .nav-links {
      order: 3;
      width: 100%;
      margin-left: 0;
      border-top: 1px solid rgba(15, 23, 42, 0.12);
      padding-top: 12px;
      display: grid;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .nav-links a {
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(255, 255, 255, 0.72);
    }

    .cta {
      margin-left: auto;
    }

    .menu-toggle:checked ~ .nav-links {
      max-height: 220px;
    }

    .menu-toggle:checked + .menu-btn span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle:checked + .menu-btn span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle:checked + .menu-btn span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }
  }
</style>

<header class="nav-shell">
  <nav class="navbar">
    <a class="brand" href="{% url 'home' %}">
      <span class="brand-mark">N</span>
      <span>
        Nova Shop
        <small>crafting online experiences</small>
      </span>
    </a>

    <input class="menu-toggle" id="menu-toggle" type="checkbox" />
    <label for="menu-toggle" class="menu-btn" aria-label="Open navigation">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <ul class="nav-links">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'about' %}">About</a></li>
        <li><a href="{% url 'posts' %}">Posts</a></li>
    </ul>

    <a class="cta" href="{% url 'about' %}">Explore More</a>
  </nav>
</header>
